<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logout-btn {
            background: #e74c3c;
            color: white;
            padding: 8px 12px;
            text-decoration: none;
            border-radius: 5px;
        }

        .dashboard {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 220px;
            background: #34495e;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar button {
            background: #1abc9c;
            border: none;
            color: white;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
            text-align: left;
        }

        .sidebar button:hover {
            background: #16a085;
        }

        .main-content {
            flex: 1;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ccc;
        }

        th {
            background: #ecf0f1;
        }

        .btn {
            padding: 8px 12px;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 4px;
        }

        .btn-green { background: #2ecc71; }
        .btn-orange { background: #e67e22; }

        textarea, input {
            width: 100%;
            padding: 10px;
        }
        label {
    display: block;
    margin-top: 12px;
}

textarea, input {
    margin-bottom: 12px;
    width: 100%;
}
.recipe-list {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.recipe-card {
    background: #ffffff;
    border-radius: 10px;
    padding: 15px 20px;
    margin-bottom: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.recipe-title {
    margin: 0;
    font-size: 18px;
    color: #2c3e50;
}

.recipe-date {
    margin: 5px 0 12px;
    color: #777;
    font-size: 14px;
}

.recipe-actions {
    display: flex;
    gap: 10px;
}

.recipe-actions .btn {
    padding: 6px 14px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
}

.btn.view {
    background: #3498db;
    color: white;
}

.btn.edit {
    background: #f39c12;
    color: white;
}
.btn.comment { 
    background-color: #2ecc71;
 } 

.btn.delete {
    background: #e74c3c;
    color: white;
}

.btn:hover {
    opacity: 0.85;
}
/* Moderation button container */
.moderation-actions {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 20px;
}

/* Common button style */
.moderation-actions .btn {
    padding: 10px 22px;
    font-size: 15px;
    font-weight: 600;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    min-width: 130px;
}

/* Approve button */
.moderation-actions .approve {
    background-color: #2ecc71;
    color: #fff;
}

/* Reject button */
.moderation-actions .reject {
    background-color: #e74c3c;
    color: #fff;
}
.moderation-actions .btn:hover {
    opacity: 0.9;
}
.stat-card{
    background:#f3f3f3;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    font-weight:bold;
}

.approved{background:#d4edda;}
.pending{background:#fff3cd;}
.rejected{background:#f8d7da;}

</style>
</head>

<body>

<header>
    <!-- <h2>Welcome, Admin</h2> -->
        <h2>Welcome, <span id="username">User</span></h2>
    <a href="#" class="logout-btn" id="btn-logout">Logout</a>

</header>

<div class="dashboard">

    <aside class="sidebar">

        <button id="btn-users">Users</button>
        <button id="btn-add-recipe">Add Recipe</button>

        <!-- <button id="btn-add-recipe">➕ Add Recipe</button> -->
        <button id="btn-other-recipes">View Other Recipes</button> <!-- renamed -->
        <button id="btn-my-recipes">View My Recipes</button> <!-- new button -->
        <button id="btn-unapproved">Unapproved</button>
        <button id="btn-rejected">Rejected Recipes</button>

        <button id="statsBtn">Stats</button>


       
        <input type="hidden" id="loggedInUserId" value="1" />
       <input type="hidden" id="loggedInUserRole" value="ADMIN" />

        <!--button id="btn-comments">Comments</button> 
        <button id="btn-reports">Reports</button>-->
    </aside>

    <!-- ✅ THIS ID IS REQUIRED -->
    <main class="main-content" id="dashboard-content">
        <p>Select a section from the menu</p>
        <div id="recipeTableContainer">
    <h2>My Recipes</h2>
    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>User</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="recipeTableBody">
            <!-- Rows will be injected dynamically here -->
        </tbody>
    </table>
</div>

    </main>

</div>

<!-- ✅ LOAD JS LAST -->
   

<script src="js/admin.js" defer></script>

</body>
</html>
