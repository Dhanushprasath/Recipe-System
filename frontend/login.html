<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Recipe Contribution System</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #020617, #1e293b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e5e7eb;
        }

        /* ===== LOGIN CARD ===== */
        .container {
            width: 100%;
            max-width: 460px;
            background: linear-gradient(135deg, #020617, #1e293b);
            padding: 50px 42px;
            border-radius: 24px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: "";
            position: absolute;
            top: -60px;
            right: -60px;
            width: 180px;
            height: 180px;
            background: rgba(0, 212, 255, 0.25);
            border-radius: 50%;
        }

        h2 {
            text-align: center;
            font-size: 36px;
            font-weight: 900;
            margin-bottom: 35px;
            color: #e5faff;
            text-shadow: 0 4px 18px rgba(0, 212, 255, 0.4);
        }

        label {
            display: block;
            margin-top: 22px;
            font-size: 18px;
            font-weight: 600;
            color: #cbd5f5;
        }

        input {
            width: 100%;
            margin-top: 8px;
            padding: 16px;
            font-size: 18px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            background: #020617;
            color: #f1f5f9;
            outline: none;
        }

        input:focus {
            border-color: #00eaff;
            box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.25);
        }

        button {
            width: 100%;
            margin-top: 32px;
            padding: 18px;
            font-size: 20px;
            font-weight: 700;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            background: linear-gradient(90deg, #00d4ff, #00ffb3);
            color: #022c22;
            transition: all 0.35s ease;
            box-shadow: 0 14px 40px rgba(0, 212, 255, 0.45);
        }

        button:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 22px 60px rgba(0, 212, 255, 0.65);
        }

        .link-container {
            text-align: center;
            margin-top: 28px;
        }

        .link-container a {
            display: block;
            margin-top: 10px;
            font-size: 16px;
            color: #00eaff;
            text-decoration: none;
            font-weight: 600;
        }

        .link-container a:hover {
            text-decoration: underline;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            h2 {
                font-size: 28px;
            }

            input {
                font-size: 16px;
            }

            button {
                font-size: 18px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Login</h2>

    <form id="loginForm">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>

        <button type="button" id="loginBtn">Login</button>
    </form>

    <div class="link-container">
        <a href="register.html">Don't have an account? Register</a>
        
    </div>
</div>

<script>
    document.getElementById("loginBtn").addEventListener("click", login);

    async function login() {
        try {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();

            if (!email || !password) {
                alert("Please enter email and password");
                return;
            }

            const response = await fetch("http://localhost:8081/api/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.message || "Login failed");
            }

            localStorage.setItem("token", data.token);
            localStorage.setItem("role", data.role);
            localStorage.setItem("email", data.email);
            localStorage.setItem("username", data.username);

            if (data.role === "ADMIN") {
                window.location.href = "admin-dashboard.html";
            } else {
                window.location.href = "dashboard.html";
            }

        } catch (err) {
            alert(err.message);
            console.error(err);
        }
    }
</script>

</body>
</html>
